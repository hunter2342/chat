<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Chat App - Ultra Premium Edition</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d97706">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

    <script>
        if (localStorage.getItem('theme') === 'light') { document.documentElement.classList.remove('dark'); } 
        else { document.documentElement.classList.add('dark'); }
        
        // تسجيل عامل الخدمة لـ PWA
        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js').catch(err => console.log('PWA SW Registration failed:', err));
        }
    </script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        brand: { 
                            dark: 'rgb(var(--color-dark) / <alpha-value>)', 
                            darker: 'rgb(var(--color-darker) / <alpha-value>)', 
                            emerald: '#059669', 
                            gold: '#d97706', 
                            surface: 'rgb(var(--color-surface) / <alpha-value>)', 
                            text: 'rgb(var(--color-text) / <alpha-value>)', 
                            muted: 'rgb(var(--color-text) / 0.5)' 
                        } 
                    },
                    animation: { 'fade-in-up': 'fadeInUp 0.3s ease-out forwards', 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' },
                    keyframes: { fadeInUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <style>
        :root { --color-darker: 245 240 235; --color-dark: 230 220 210; --color-surface: 255 255 255; --color-text: 24 16 10; }
        html.dark { --color-darker: 10 12 18; --color-dark: 18 22 32; --color-surface: 28 36 50; --color-text: 245 247 250; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(217, 119, 6, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(217, 119, 6, 0.6); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        body { height: 100dvh; height: -webkit-fill-available; transition: background-color 0.4s ease; background-color: rgb(var(--color-darker)); position: relative; }
        
        /* طبقة الجسيمات التفاعلية */
        #particles-js { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .tab-content { display: none; opacity: 0; transition: opacity 0.3s ease; }
        .tab-content.active { display: flex; flex-direction: column; height: 100%; opacity: 1; animation: fadeInUp 0.4s ease forwards;}
        
        /* تأثير الزجاج (Glassmorphism) */
        .glass-panel { background: rgba(var(--color-surface) / 0.55); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.1); position: relative; z-index: 10;}
        html.dark .glass-panel { background: rgba(18, 24, 38, 0.65); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .msg-bubble { box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.03); }
        .msg-bubble:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
        
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0.5rem); }
        .pt-safe { padding-top: env(safe-area-inset-top, 1rem); }
        
        .media-content img, .media-content video { max-height: 280px; border-radius: 1rem; object-fit: cover; border: 1px solid rgba(var(--color-text) / 0.1); }
        
        /* تصميم زر العرض لمرة واحدة */
        .view-once-btn { background: repeating-linear-gradient(45deg, rgba(217,119,6,0.05), rgba(217,119,6,0.05) 10px, rgba(217,119,6,0.1) 10px, rgba(217,119,6,0.1) 20px); border: 1px dashed rgba(217,119,6,0.5); }
        
        .toggle-checkbox:checked { right: 0; border-color: #d97706; }
        .toggle-checkbox:checked + .toggle-label { background-color: #d97706; }
    </style>
</head>
<body class="text-brand-text h-[100dvh] overflow-hidden font-sans antialiased flex justify-center bg-brand-darker">

    <div id="particles-js"></div>

    <div id="auth-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-brand-darker/90 backdrop-blur-xl p-4 transition-opacity duration-500">
        <div class="glass-panel p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md relative overflow-hidden">
            <div class="absolute -top-24 -right-24 w-48 h-48 bg-brand-gold rounded-full blur-[80px] opacity-10"></div>
            
            <div class="flex justify-center mb-6 relative z-10">
                <div class="w-16 h-16 bg-brand-darker rounded-2xl flex items-center justify-center border border-brand-gold shadow-[0_0_20px_rgba(217,119,6,0.25)] transform rotate-3 hover:rotate-0 transition-transform">
                    <i data-lucide="zap" class="w-8 h-8 text-brand-gold fill-current"></i>
                </div>
            </div>

            <div class="flex justify-center gap-6 mb-8 border-b border-brand-text/10 relative z-10">
                <button id="tab-login" onclick="switchAuthMode('login')" class="pb-3 text-brand-gold font-black border-b-2 border-brand-gold transition-colors text-lg tracking-wide">دخول</button>
                <button id="tab-signup" onclick="switchAuthMode('signup')" class="pb-3 text-brand-muted font-bold border-b-2 border-transparent hover:text-brand-gold transition-colors text-lg tracking-wide">تسجيل</button>
            </div>

            <div class="flex flex-col gap-4 relative z-10">
                <div id="signup-fields" class="hidden flex-col gap-4 animate-fade-in-up">
                    <div class="flex justify-center mb-2">
                        <div class="relative w-24 h-24 rounded-full bg-brand-dark/80 border-2 border-dashed border-brand-gold flex items-center justify-center cursor-pointer group hover:bg-brand-surface transition-colors overflow-hidden shadow-inner" onclick="document.getElementById('auth-avatar-input').click()">
                            <img id="auth-avatar-preview" class="w-full h-full object-cover hidden">
                            <i id="auth-avatar-icon" data-lucide="camera" class="w-7 h-7 text-brand-gold group-hover:scale-110 transition-transform absolute"></i>
                        </div>
                        <input type="file" id="auth-avatar-input" accept="image/*" class="hidden">
                    </div>
                    <input type="text" id="auth-name" placeholder="الاسم المستعار" class="px-5 py-4 bg-brand-dark/30 rounded-2xl text-brand-text focus:ring-2 focus:ring-brand-gold border border-brand-text/10 w-full outline-none transition-shadow placeholder-brand-muted">
                </div>

                <input type="email" id="email" placeholder="البريد الإلكتروني" class="px-5 py-4 bg-brand-dark/30 rounded-2xl text-brand-text focus:ring-2 focus:ring-brand-gold border border-brand-text/10 w-full outline-none transition-shadow placeholder-brand-muted">
                <input type="password" id="password" placeholder="كلمة المرور" class="px-5 py-4 bg-brand-dark/30 rounded-2xl text-brand-text focus:ring-2 focus:ring-brand-gold border border-brand-text/10 w-full outline-none transition-shadow placeholder-brand-muted">
                
                <button id="auth-action-btn" class="bg-gradient-to-r from-amber-600 to-brand-gold text-white p-4 rounded-2xl font-black text-lg transition-all active:scale-95 flex justify-center items-center h-14 shadow-[0_10px_25px_rgba(217,119,6,0.25)] hover:shadow-[0_10px_30px_rgba(217,119,6,0.4)] mt-4">
                    <span id="auth-btn-text">دخول للنظام</span><i data-lucide="loader-2" class="w-6 h-6 animate-spin hidden"></i>
                </button>
                <p id="auth-error" class="text-red-500 text-sm text-center hidden bg-red-500/10 p-3 rounded-xl border border-red-500/30"></p>
            </div>
        </div>
    </div>

    <div id="main-screen" class="hidden w-full max-w-6xl h-full flex flex-col md:flex-row relative glass-panel shadow-2xl overflow-hidden md:my-4 md:rounded-[2.5rem]">
        <main class="flex-1 flex flex-col h-full overflow-hidden w-full md:order-2 relative z-10">
            <header class="h-20 px-6 flex justify-between items-center bg-brand-darker/40 backdrop-blur-md border-b border-brand-text/5 flex-shrink-0 z-20 shadow-sm">
                <h2 id="main-header-title" class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-brand-gold to-amber-400 tracking-wide">المحادثات</h2>
                <div class="flex items-center gap-3 bg-brand-surface/30 px-4 py-2 rounded-full border border-brand-text/5">
                    <div id="global-connection-status" class="w-2.5 h-2.5 bg-amber-500 rounded-full shadow-[0_0_10px_#d97706]"></div>
                    <span id="global-connection-text" class="text-xs text-brand-muted font-bold hidden md:block">متصل ومزامن</span>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto no-scrollbar relative">
                <div id="tab-users" class="tab-content active p-4 md:p-6 pb-24 md:pb-6 gap-3">
                    <div class="flex items-center gap-3 bg-brand-surface/20 p-4 rounded-2xl border border-brand-text/5 shadow-inner sticky top-0 z-10 backdrop-blur-xl transition-all focus-within:border-brand-gold">
                        <i data-lucide="search" class="w-5 h-5 text-brand-muted"></i>
                        <input type="text" id="contact-search-input" placeholder="ابحث في جهات الاتصال..." class="flex-1 bg-transparent border-none text-brand-text outline-none font-medium placeholder-brand-muted">
                    </div>
                    <div id="users-list" class="flex flex-col gap-2.5 mt-3"></div>
                </div>

                <div id="tab-groups" class="tab-content p-4 md:p-6 pb-24 md:pb-6 gap-4">
                    <div class="flex gap-3 mb-2 sticky top-0 bg-brand-surface/20 backdrop-blur-xl p-4 rounded-2xl z-10 border border-brand-text/5 shadow-inner focus-within:border-brand-gold transition-colors">
                        <input type="text" id="new-group-name" placeholder="اسم المجموعة الجديدة..." class="flex-1 bg-transparent text-brand-text outline-none font-medium px-2 placeholder-brand-muted">
                        <button id="create-group-btn" class="bg-brand-gold text-white px-6 py-2 rounded-xl font-bold flex items-center justify-center min-w-[56px] hover:bg-amber-600 transition-colors shadow-md active:scale-95">
                            <span><i data-lucide="plus" class="w-6 h-6"></i></span><i data-lucide="loader-2" class="w-6 h-6 animate-spin hidden"></i>
                        </button>
                    </div>
                    <div id="groups-list" class="flex flex-col gap-2.5"></div>
                </div>
                
                <div id="tab-stories" class="tab-content p-0 pb-24 md:pb-6 gap-0 w-full max-w-3xl mx-auto">
                    <div class="p-5 pt-6 bg-brand-surface/10 md:rounded-3xl border-b md:border border-brand-text/5 shadow-sm md:mt-4 md:mx-4 backdrop-blur-md">
                        <div class="flex gap-5 overflow-x-auto no-scrollbar pb-2 items-start" id="stories-avatars-list"></div>
                    </div>
                    <div class="p-5 mt-2">
                        <h4 class="text-xs font-black text-brand-gold mb-4 px-2 uppercase tracking-widest">التحديثات الأخيرة</h4>
                        <div class="flex flex-col gap-2.5" id="stories-vertical-list"></div>
                    </div>
                </div>
                
                <div id="tab-settings" class="tab-content p-6 pb-32 pt-8 gap-4 w-full max-w-md mx-auto overflow-y-auto no-scrollbar">
                    <div class="relative w-32 h-32 mx-auto cursor-pointer group hover:scale-105 transition-transform shrink-0" onclick="document.getElementById('settings-avatar-input').click()">
                        <div id="settings-avatar-container" class="w-full h-full bg-gradient-to-tr from-brand-gold to-brand-darker rounded-[2.5rem] flex items-center justify-center shadow-xl border-2 border-brand-gold/20 overflow-hidden relative">
                            <img id="settings-avatar-img" class="w-full h-full object-cover hidden">
                            <i id="settings-avatar-icon" data-lucide="user" class="w-14 h-14 text-white"></i>
                        </div>
                        <div class="absolute inset-0 bg-black/40 rounded-[2.5rem] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity backdrop-blur-sm">
                            <i data-lucide="camera" class="w-8 h-8 text-white"></i>
                        </div>
                        <input type="file" id="settings-avatar-input" accept="image/*" class="hidden">
                    </div>

                    <div class="w-full flex flex-col gap-4 mt-4 shrink-0">
                        <div class="relative">
                            <label class="absolute -top-2 right-4 bg-brand-dark px-2 text-[10px] text-brand-gold font-bold z-10 rounded-md">الاسم المستعار</label>
                            <input type="text" id="profile-name" class="w-full bg-brand-surface/20 p-4 rounded-xl border border-brand-text/5 text-brand-text outline-none focus:border-brand-gold transition-colors relative z-0 font-medium">
                        </div>
                        <div class="relative">
                            <label class="absolute -top-2 right-4 bg-brand-dark px-2 text-[10px] text-brand-gold font-bold z-10 rounded-md">الحالة المكتوبة</label>
                            <textarea id="profile-bio" class="w-full bg-brand-surface/20 p-4 rounded-xl border border-brand-text/5 text-brand-text outline-none focus:border-brand-gold h-24 resize-none transition-colors relative z-0 font-medium"></textarea>
                        </div>
                        
                        <div class="flex items-center justify-between p-4 bg-brand-surface/20 rounded-xl border border-brand-text/5">
                            <div class="flex items-center gap-3">
                                <i data-lucide="moon" class="w-5 h-5 text-brand-gold"></i><span class="font-bold text-brand-text text-sm">الوضع المظلم</span>
                            </div>
                            <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" id="theme-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 z-10" onchange="toggleTheme()"/>
                                <label for="theme-toggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-400 dark:bg-gray-600 cursor-pointer transition-colors duration-300"></label>
                            </div>
                        </div>

                        <button id="save-profile-btn" class="bg-gradient-to-r from-amber-600 to-brand-gold text-white p-4 rounded-xl font-black flex justify-center items-center h-14 hover:from-amber-700 hover:to-amber-600 shadow-md transition-all active:scale-95 mt-2">
                            <span>حفظ التعديلات</span><i data-lucide="loader-2" class="w-6 h-6 animate-spin hidden"></i>
                        </button>
                    </div>
                    
                    <button id="logout-btn" class="mt-4 bg-red-500/10 text-red-500 border border-red-500/20 px-10 py-4 rounded-xl font-bold w-full hover:bg-red-600 hover:text-white transition-all flex items-center justify-center gap-3 active:scale-95 shrink-0 text-sm">
                        <i data-lucide="log-out" class="w-4 h-4"></i> تسجيل الخروج
                    </button>
                </div>
            </div>
        </main>

        <nav class="fixed bottom-0 w-full md:static md:w-24 lg:w-64 bg-brand-darker/80 backdrop-blur-2xl border-t md:border-t-0 md:border-l border-brand-text/5 flex flex-row md:flex-col justify-around md:justify-start p-3 z-30 md:order-1 pb-safe gap-1 md:gap-3">
            <button onclick="switchTab('users', 'المحادثات')" id="nav-users" class="nav-btn p-3.5 w-1/4 md:w-full text-brand-gold bg-brand-gold/10 rounded-2xl flex flex-col md:flex-row items-center gap-2.5 transition-all"><i data-lucide="message-square" class="w-5 h-5 md:w-6 md:h-6"></i><span class="text-[11px] md:text-sm font-bold md:hidden lg:block">الدردشة</span></button>
            <button onclick="switchTab('groups', 'الفرق والمجموعات')" id="nav-groups" class="nav-btn p-3.5 w-1/4 md:w-full text-brand-muted hover:bg-brand-surface/40 hover:text-brand-text rounded-2xl flex flex-col md:flex-row items-center gap-2.5 transition-all"><i data-lucide="users" class="w-5 h-5 md:w-6 md:h-6"></i><span class="text-[11px] md:text-sm font-bold md:hidden lg:block">المجموعات</span></button>
            <button onclick="switchTab('stories', 'الحالات')" id="nav-stories" class="nav-btn p-3.5 w-1/4 md:w-full text-brand-muted hover:bg-brand-surface/40 hover:text-brand-text rounded-2xl flex flex-col md:flex-row items-center gap-2.5 transition-all"><i data-lucide="aperture" class="w-5 h-5 md:w-6 md:h-6"></i><span class="text-[11px] md:text-sm font-bold md:hidden lg:block">الحالات</span></button>
            <button onclick="switchTab('settings', 'إعدادات النظام')" id="nav-settings" class="nav-btn p-3.5 w-1/4 md:w-full text-brand-muted hover:bg-brand-surface/40 hover:text-brand-text rounded-2xl flex flex-col md:flex-row items-center gap-2.5 md:mt-auto transition-all"><i data-lucide="settings" class="w-5 h-5 md:w-6 md:h-6"></i><span class="text-[11px] md:text-sm font-bold md:hidden lg:block">الإعدادات</span></button>
        </nav>
    </div>

    <div id="chat-screen" class="hidden fixed inset-0 z-[60] flex flex-col w-full bg-brand-dark/95 backdrop-blur-3xl shadow-2xl md:absolute md:max-w-6xl md:mx-auto md:w-[calc(100%-6rem)] lg:w-[calc(100%-16rem)] md:left-0 overflow-hidden md:my-4 md:rounded-[2.5rem]">
        
        <div id="sidebar-overlay" class="hidden absolute inset-0 bg-black/50 z-[65] backdrop-blur-md transition-opacity opacity-0" onclick="toggleSidebar()"></div>
        
        <aside id="chat-sidebar" class="absolute top-0 bottom-0 right-0 w-72 md:w-80 bg-brand-darker/95 backdrop-blur-3xl border-l border-brand-text/5 z-[70] transform translate-x-full transition-transform duration-300 flex flex-col shadow-2xl">
            <div class="p-5 pt-safe border-b border-brand-text/5 flex justify-between items-center bg-brand-surface/10">
                <h3 class="text-brand-gold font-bold text-base">Security & Privacy</h3>
                <button onclick="toggleSidebar()" class="text-brand-muted hover:text-brand-text bg-brand-surface/40 p-2 rounded-xl"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div class="p-5 flex flex-col gap-3 overflow-y-auto no-scrollbar flex-1">
                <div class="flex flex-col items-center gap-3 pb-6 border-b border-brand-text/5 mb-2 relative mt-2">
                    <div id="sidebar-user-avatar" class="w-24 h-24 bg-gradient-to-tr from-brand-gold to-brand-dark rounded-[1.75rem] flex items-center justify-center text-4xl font-black text-white shadow-lg overflow-hidden">M</div>
                    <div id="sidebar-user-status-dot" class="absolute bottom-24 right-16 w-5 h-5 bg-amber-500 border-4 border-brand-darker rounded-full hidden shadow-md"></div>
                    <h4 id="sidebar-user-name" class="font-black text-brand-text text-xl mt-2 text-center px-2">الاسم</h4>
                    <p id="sidebar-user-bio" class="text-xs text-brand-gold font-semibold text-center px-3 bg-brand-gold/10 py-1.5 rounded-lg mt-0.5">متاح</p>
                    <p id="sidebar-user-lastseen" class="text-[10px] text-brand-muted font-bold text-center mt-0.5"></p>
                </div>
                
                <div class="bg-brand-surface/20 p-3.5 rounded-xl border border-brand-text/5 text-xs flex flex-col gap-1">
                    <span class="font-black text-brand-gold mb-1 flex items-center gap-1"><i data-lucide="shield-check" class="w-3.5 h-3.5"></i> تشفير E2EE</span>
                    <p class="text-brand-muted text-[11px] leading-relaxed">الرسائل والمكالمات في هذه الدردشة محمية بالكامل بتشفير متطور (AES-GCM).</p>
                </div>

                <button onclick="toggleSearch()" class="flex items-center gap-3 p-3.5 hover:bg-brand-surface/40 rounded-xl text-brand-text text-sm font-medium transition-colors border border-transparent hover:border-brand-text/5"><i data-lucide="search" class="w-4 h-4 text-brand-gold"></i> البحث</button>
                <button onclick="clearChat()" class="flex items-center gap-3 p-3.5 hover:bg-brand-surface/40 rounded-xl text-brand-text text-sm font-medium transition-colors border border-transparent hover:border-brand-text/5"><i data-lucide="trash-2" class="w-4 h-4 text-orange-400"></i> مسح السجل</button>
                <button onclick="blockUser()" class="flex items-center gap-3 p-3.5 bg-red-500/10 hover:bg-red-500/20 rounded-xl text-red-500 text-sm font-bold transition-colors mt-auto"><i data-lucide="ban" class="w-4 h-4"></i> حظر جهة الاتصال</button>
            </div>
        </aside>

        <header class="h-20 px-4 flex items-center justify-between bg-brand-darker/70 border-b border-brand-text/5 z-20 flex-shrink-0 backdrop-blur-xl">
            <div class="flex items-center gap-3 pt-safe cursor-pointer group" onclick="toggleSidebar()">
                <button id="close-chat-btn" class="p-2 bg-brand-surface/40 border border-brand-text/5 text-brand-text hover:text-brand-gold rounded-xl shadow-sm" onclick="event.stopPropagation()"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                <div class="relative transition-transform group-hover:scale-105">
                    <div id="chat-header-avatar" class="w-11 h-11 bg-gradient-to-tr from-brand-dark to-brand-surface rounded-xl flex items-center justify-center shadow-md overflow-hidden border border-brand-text/5"><i data-lucide="hash" class="w-5 h-5 text-brand-gold"></i></div>
                    <div id="chat-header-status-dot" class="absolute -bottom-1 -right-1 w-3 h-3 bg-amber-500 border-2 border-brand-darker rounded-full hidden"></div>
                </div>
                <div class="flex flex-col"><h2 id="chat-title" class="text-base md:text-lg font-black text-brand-text">الدردشة</h2><span id="chat-typing-status" class="text-[11px] font-bold text-brand-gold h-3.5 mt-0.5"></span></div>
            </div>
        </header>

        <div id="chat-search-bar" class="hidden bg-brand-surface/90 backdrop-blur-md border-b border-brand-gold/20 p-3 px-4 items-center gap-3 z-10 shadow-lg">
            <i data-lucide="search" class="w-4 h-4 text-brand-gold"></i>
            <input type="text" id="chat-search-input" placeholder="اكتب للبحث..." class="flex-1 bg-transparent border-none text-xs text-brand-text outline-none font-medium">
            <button onclick="closeSearch()" class="text-brand-muted hover:text-red-500 p-1.5"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
        </div>

        <div class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col no-scrollbar relative transition-all duration-300 bg-gradient-to-b from-black/5 to-transparent" id="messages-area"></div>

                                else { mediaHtml = `<button onclick="openViewOnce('${msgId}', '${msg.mediaUrl}', '${msg.mediaType}')" class="w-full p-4 rounded-xl view-once-btn text-brand-gold font-bold flex flex-col items-center gap-2 hover:bg-brand-gold/10 transition-colors shadow-inner"><i data-lucide="eye" class="w-6 h-6 text-amber-500"></i> انقر لفتح الوسائط (سيتم تدميرها فوراً)</button>`; }
                            } else {
                                if (msg.mediaType === 'video') { mediaHtml = `<div class="relative"><video src="${msg.mediaUrl}" class="mt-2 w-full max-w-xs rounded-xl shadow-md bg-black cursor-pointer" onclick="openNormalMedia('${msg.mediaUrl}', 'video')"></video><div class="absolute inset-0 flex items-center justify-center pointer-events-none"><div class="bg-black/50 p-3 rounded-full backdrop-blur-md"><i data-lucide="play" class="w-6 h-6 text-white fill-current"></i></div></div></div>`; } 
                                else if (msg.mediaType === 'audio') { 
                                    // تطبيق Wavesurfer للصوتيات
                                    mediaHtml = `<div class="mt-2 w-full max-w-[250px] bg-brand-darker/60 backdrop-blur-md border border-brand-gold/20 p-2.5 rounded-xl flex items-center gap-3 shadow-inner"><button onclick="playWave('${msgId}')" class="p-2.5 bg-gradient-to-tr from-amber-600 to-brand-gold text-white rounded-full shadow-md hover:scale-105 transition-transform"><i data-lucide="play" class="w-4 h-4 fill-current"></i></button><div id="wave-${msgId}" class="flex-1 h-8"></div></div>`; 
                                    setTimeout(() => {
                                        if(!activeWavesurfers[msgId]) {
                                            activeWavesurfers[msgId] = WaveSurfer.create({ container: `#wave-${msgId}`, waveColor: 'rgba(217, 119, 6, 0.4)', progressColor: '#d97706', height: 32, barWidth: 2, barGap: 1, barRadius: 2, url: msg.mediaUrl });
                                        }
                                    }, 100);
                                } 
                                else { mediaHtml = `<img src="${msg.mediaUrl}" onclick="openNormalMedia('${msg.mediaUrl}', 'image')" class="mt-2 w-full max-w-xs rounded-xl border border-brand-text/10 shadow-md cursor-zoom-in" loading="lazy">`; }
                            }
                        }

                        // علامة القراءة (Checkmarks)
                        const statusIcon = isMe ? (msg.status === 'read' ? '<i data-lucide="check-check" class="w-3.5 h-3.5 inline text-blue-400"></i>' : '<i data-lucide="check" class="w-3.5 h-3.5 inline text-gray-400"></i>') : '';

                        const div = document.createElement('div');
                        div.id = `msg-${msgId}`;
                        div.setAttribute('data-text', decryptedText.toLowerCase());
                        
                        div.className = `msg-bubble p-3.5 px-4 max-w-[85%] md:max-w-md relative w-fit group flex flex-col ${radiusClass} ${marginClass} ${isMe ? 'self-end bg-gradient-to-tr from-brand-surface to-brand-dark/30 border border-brand-gold/30 text-brand-text shadow-sm' : 'self-start bg-brand-surface/20 backdrop-blur-sm border border-brand-text/5 text-brand-text'}`;
                        
                        div.innerHTML = `
                            ${!isMe && !isGrouped ? `<div class="text-[11px] text-brand-gold font-black mb-1">${senderName}</div>` : ''}
                            <div class="leading-relaxed break-words text-[14px] media-content">
                                ${mediaHtml}
                                ${decryptedText ? `<div class="${msg.mediaUrl ? 'mt-1.5' : ''}">${formatMarkdown(decryptedText)}</div>` : ''}
                                <div class="flex items-center justify-end mt-2 opacity-70 text-[10px] gap-1">
                                    <span class="font-sans" dir="ltr">${msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                                    ${statusIcon}
                                </div>
                            </div>
                        `;
                        area.appendChild(div);
                    });

                    if (!hasMessages) {
                        area.innerHTML = `
                            <div class="flex-1 flex flex-col items-center justify-center opacity-40 my-auto">
                                <div class="w-20 h-20 bg-brand-surface rounded-full flex items-center justify-center mb-3 border border-brand-text/5"><i data-lucide="shield" class="w-8 h-8 text-brand-gold"></i></div>
                                <p class="text-brand-text text-sm font-medium">المحادثة مشفرة تماماً E2EE. أرسل رسالة للبدء.</p>
                            </div>`;
                    } else if (area.scrollHeight - area.scrollTop - area.clientHeight < 300) { area.scrollTo({ top: area.scrollHeight, behavior: 'smooth' }); }
                    
                    lucide.createIcons();
                    if(Object.keys(updatesToRead).length > 0) update(ref(db, `chats/${currentChatId}/messages`), updatesToRead);
                });
            });
        }
    </script>
</body>
</html>
